<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bingo Musical 🎶</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    margin: 0;
    height: 100vh;

    background: linear-gradient(135deg, #ff7e5f, #feb47b, #6a11cb, #2575fc);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    margin-top: 100px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background-color: #ffffff;
    color: #333;
    cursor: pointer;
    margin-top: 20px;
}

button:hover {
    background-color: #ddd;
}

.numero {
    font-size: 80px;
    font-weight: bold;
}

.cancion {
    font-size: 24px;
    margin-top: 20px;
}
</style>

</head>
<body>

<div class="container">
    <h1>🎶 BINGO MUSICAL 🎶</h1>
    <div class="numero" id="numero">?</div>
    <div class="cancion" id="cancion"></div>
    <button onclick="siguiente()">Siguiente canción</button>
</div>

<script>
const canciones = [
"Macarena - Los del Río",
"Aserejé - Las Ketchup",
"Bailando - Enrique Iglesias",
"Sofía - Álvaro Soler",
"El Mismo Sol - Álvaro Soler",
"Bailando Por Ahí - Juan Magán",
"Te Voy A Esperar - Juan Magán",
"Un Beso y Una Flor - Nino Bravo",
"Súbeme La Radio - Enrique Iglesias",
"Rayos De Sol - Henry Méndez",
"Caminando Por La Vida - Melendi",
"Zapatillas - El Canto del Loco",
"Despacito - Luis Fonsi",
"Mon Amour - Aitana",
"Princesas - Pereza",
"A Quién Le Importa - Alaska",
"Bulería - David Bisbal",
"Ave María - David Bisbal",
"Cómo Te Atreves - Morat",
"Vivir Mi Vida - Marc Anthony",
"Rosa Pastel - Belanova",
"La Gozadera - Gente de Zona",
"Bomba - King África",
"Sueño Contigo - Camela",
"Limbo - Daddy Yankee",
"Pan y Mantequilla - Efecto Pasillo",
"Señorita - Abraham Mateo",
"SloMo - Chanel",
"Mi Carro - Manolo Escobar",
"Morocha - Luck Ra",
"Que La Detengan - David Civera",
"Salta - Tequila",
"Vino Tinto - Estopa"
];

let usadas = [];

function siguiente() {
    if (usadas.length === canciones.length) {
        alert("¡Se han usado todas!");
        return;
    }

    let random;
    do {
        random = Math.floor(Math.random() * canciones.length);
    } while (usadas.includes(random));

    usadas.push(random);

    document.getElementById("numero").innerText = usadas.length;
    document.getElementById("cancion").innerText = canciones[random];
}
</script>

</body>
</html>
