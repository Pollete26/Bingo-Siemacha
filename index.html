<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Musical 🎶</title>

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  color:white;
  background: linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#5f27cd,#1dd1a1);
  background-size:400% 400%;
  animation:bg 12s infinite;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

.container{
  padding:20px;
}

.numero{
  font-size:80px;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  opacity:0;
  pointer-events:none;
  z-index:9999;
}

.overlay.visible{
  opacity:1;
}

.overlay-box{
  padding:50px;
  border-radius:30px;
  transform:scale(0.6);
  opacity:0;
}

.overlay.visible .overlay-box{
  animation:pop 0.6s forwards;
}

@keyframes pop{
0%{transform:scale(0.4)}
60%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* LINEA */
.linea{
  background:linear-gradient(45deg,#ffb703,#fb8500);
  font-size:70px;
}

/* BINGO */
.bingo{
  background:linear-gradient(45deg,#ff006e,#8338ec,#3a86ff);
  font-size:110px;
  box-shadow:0 0 60px rgba(255,255,255,0.8);
}

/* CONFETI */
#confeti{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9998;
}

/* EXPLOSION */
.explosion{
  position:absolute;
  width:200px;
  height:200px;
  border-radius:50%;
  border:5px solid white;
  animation:boom 1s ease-out forwards;
}

@keyframes boom{
0%{transform:scale(0.3);opacity:1}
100%{transform:scale(2.5);opacity:0}
}

/* LUCES */
.light{
  position:absolute;
  width:15px;
  height:15px;
  border-radius:50%;
  background:white;
  box-shadow:0 0 20px white;
  animation:blink 0.5s infinite alternate;
}

@keyframes blink{
from{opacity:0.3}
to{opacity:1}
}
</style>
</head>

<body>

<div class="container">
<h1>Bingo Musical 🎶</h1>

<div class="numero" id="numero">?</div>
<div id="cancion">Pulsa empezar</div>

<button onclick="siguiente()">Siguiente</button>
<button onclick="repetir()">Repetir</button>
<button onclick="linea()">Línea</button>
<button onclick="bingo()">Bingo</button>

<audio id="audio"></audio>
</div>

<canvas id="confeti"></canvas>

<div class="overlay" id="overlay">
  <div class="overlay-box" id="box"></div>
</div>

<script>
const canciones=[
{numero:1,titulo:"Macarena",audio:"audios/01-macarena.mp3"},
{numero:2,titulo:"Asereje",audio:"audios/02-asereje.mp3"}
];

let restantes=[...canciones];
let actual=null;

const num=document.getElementById("numero");
const txt=document.getElementById("cancion");
const audio=document.getElementById("audio");
const overlay=document.getElementById("overlay");
const box=document.getElementById("box");

/* CONFETI */
const canvas=document.getElementById("confeti");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confeti=[];

function lanzarConfeti(potente=false){
  confeti=[];
  let cantidad=potente?250:120;

  for(let i=0;i<cantidad;i++){
    confeti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height-canvas.height,
      size:Math.random()*10+5,
      speed:Math.random()*4+2,
      color:`hsl(${Math.random()*360},100%,60%)`
    });
  }

  animar();
}

function animar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confeti.forEach(p=>{
    p.y+=p.speed;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,p.size,p.size);
  });
  requestAnimationFrame(animar);
}

/* JUEGO */
function siguiente(){
  if(restantes.length===0)return;
  let i=Math.floor(Math.random()*restantes.length);
  actual=restantes[i];
  restantes.splice(i,1);

  num.innerText=actual.numero;
  txt.innerText=actual.titulo;

  audio.src=actual.audio;
  audio.play();
}

function repetir(){
  audio.play();
}

/* LINEA */
function linea(){
  box.className="overlay-box linea";
  box.innerText="LÍNEA";
  overlay.classList.add("visible");

  lanzarConfeti(false);

  setTimeout(()=>overlay.classList.remove("visible"),20000);
}

/* BINGO */
function bingo(){
  box.className="overlay-box bingo";
  box.innerText="BINGO";
  overlay.classList.add("visible");

  lanzarConfeti(true);

  crearExplosion();
  crearLuces();

  setTimeout(()=>overlay.classList.remove("visible"),20000);
}

/* EFECTOS EXTRA */
function crearExplosion(){
  let e=document.createElement("div");
  e.className="explosion";
  overlay.appendChild(e);

  setTimeout(()=>e.remove(),1000);
}

function crearLuces(){
  for(let i=0;i<20;i++){
    let l=document.createElement("div");
    l.className="light";
    l.style.top=Math.random()*100+"%";
    l.style.left=Math.random()*100+"%";
    overlay.appendChild(l);

    setTimeout(()=>l.remove(),2000);
  }
}
</script>

</body>
</html>
