<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Musical 🎶</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
  background: linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#5f27cd,#1dd1a1);
  background-size:400% 400%;
  animation:bg 12s infinite;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

/* PORTADA */
.portada{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.82);
  z-index:99999;
}

.portada h1{
  font-size:60px;
  margin-bottom:20px;
  animation:zoom 1s ease;
}

.portada p{
  font-size:20px;
  opacity:0.85;
  margin-bottom:30px;
}

@keyframes zoom{
  0%{transform:scale(0.5);opacity:0}
  100%{transform:scale(1);opacity:1}
}

.portada button{
  font-size:20px;
  padding:15px 30px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  font-weight:bold;
}

/* CONTENIDO */
.container{
  max-width:1200px;
  margin:0 auto;
  padding:20px;
}

.numero{
  font-size:80px;
  margin-top:20px;
  font-weight:bold;
}

#cancion{
  font-size:24px;
  margin-bottom:20px;
  min-height:32px;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.botones{
  margin-bottom:20px;
}

/* GRID NÚMEROS */
.panel-numeros{
  margin-top:25px;
}

.grid-numeros{
  display:grid;
  grid-template-columns:repeat(10, minmax(0,1fr));
  gap:8px;
  max-width:900px;
  margin:15px auto 0;
}

.casilla-numero{
  background:rgba(255,255,255,0.92);
  color:#222;
  border-radius:10px;
  padding:8px 4px;
  text-align:center;
  font-weight:bold;
  min-height:52px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.numero-base{
  font-size:1rem;
  line-height:1.1;
}

.orden-salida{
  font-size:0.78rem;
  line-height:1.1;
  opacity:0;
  margin-top:3px;
}

.casilla-numero.marcado{
  background:#e53935;
  color:white;
}

.casilla-numero.marcado .orden-salida{
  opacity:1;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  opacity:0;
  pointer-events:none;
  z-index:9999;
}

.overlay.visible{
  opacity:1;
}

.overlay-box{
  padding:50px;
  border-radius:30px;
  transform:scale(0.6);
  opacity:0;
  position:relative;
}

.overlay.visible .overlay-box{
  animation:pop 0.6s forwards;
}

@keyframes pop{
  0%{transform:scale(0.4)}
  60%{transform:scale(1.2)}
  100%{transform:scale(1)}
}

.linea{
  background:linear-gradient(45deg,#ffb703,#fb8500);
  font-size:70px;
}

.bingo{
  background:linear-gradient(45deg,#ff006e,#8338ec,#3a86ff);
  font-size:110px;
}

/* CONFETI */
#confeti{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9998;
}

/* LUCES */
.light{
  position:absolute;
  width:15px;
  height:15px;
  border-radius:50%;
  background:white;
  box-shadow:0 0 20px white;
  animation:blink 0.5s infinite alternate;
}

@keyframes blink{
  from{opacity:0.3}
  to{opacity:1}
}

@media (max-width:700px){
  .portada h1{font-size:42px;}
  .numero{font-size:58px;}
  #cancion{font-size:18px;}
  .grid-numeros{grid-template-columns:repeat(5, minmax(0,1fr));}
  .linea{font-size:42px;}
  .bingo{font-size:62px;}
}
</style>
</head>

<body>

<!-- PORTADA -->
<div class="portada" id="portada">
  <h1>🎶 Bingo Musical 🎶</h1>
  <p>¡Prepárate para jugar! / Przygotuj się do gry!</p>
  <button onclick="empezar()">▶️ Empezar / Rozpocznij</button>
</div>

<div class="container">
  <h1>🎶 Bingo Musical 🎶</h1>

  <div class="numero" id="numero">?</div>
  <div id="cancion">Pulsa empezar / Naciśnij start</div>

  <div class="botones">
    <button onclick="siguiente()">Siguiente / Następna</button>
    <button onclick="repetir()">Repetir / Powtórz</button>
    <button onclick="linea()">Cantar línea / Śpiewać linię</button>
    <button onclick="bingo()">Cantar bingo / Śpiewać bingo</button>
    <button onclick="reiniciarBingo()">Reiniciar bingo / Resetuj bingo</button>
  </div>

  <div class="panel-numeros">
    <h2>Números del bingo / Numery bingo</h2>
    <div class="grid-numeros" id="gridNumeros"></div>
  </div>

  <audio id="audio"></audio>
</div>

<canvas id="confeti"></canvas>

<div class="overlay" id="overlay">
  <div class="overlay-box" id="box"></div>
</div>

<script>
/* PORTADA */
function empezar(){
  document.getElementById("portada").style.display="none";
}

/* CANCIONES */
const canciones=[
  {numero:1,titulo:"Macarena",audio:"audios/01-macarena.mp3"},
  {numero:2,titulo:"Asereje",audio:"audios/02-asereje.mp3"},
  {numero:3,titulo:"Bailando",audio:"audios/03-bailando.mp3"},
  {numero:4,titulo:"Sofía",audio:"audios/04-sofia.mp3"},
  {numero:5,titulo:"El Mismo Sol",audio:"audios/05-el-mismo-sol.mp3"},
  {numero:6,titulo:"Bailando Por Ahí",audio:"audios/06-bailando-por-ahi.mp3"},
  {numero:7,titulo:"Te Voy A Esperar",audio:"audios/07-te-voy-a-esperar.mp3"},
  {numero:8,titulo:"Un Beso y Una Flor",audio:"audios/08-un-beso-y-una-flor.mp3"},
  {numero:9,titulo:"Súbeme La Radio",audio:"audios/09-subeme-la-radio.mp3"},
  {numero:10,titulo:"Rayos De Sol",audio:"audios/10-rayos-de-sol.mp3"},
  {numero:11,titulo:"Caminando Por La Vida",audio:"audios/11-caminando-por-la-vida.mp3"},
  {numero:12,titulo:"Zapatillas",audio:"audios/12-zapatillas.mp3"},
  {numero:13,titulo:"Despacito",audio:"audios/13-despacito.mp3"},
  {numero:14,titulo:"Mon Amour",audio:"audios/14-mon-amour.mp3"},
  {numero:15,titulo:"Princesas",audio:"audios/15-princesas.mp3"},
  {numero:16,titulo:"A Quién Le Importa",audio:"audios/16-a-quien-le-importa.mp3"},
  {numero:17,titulo:"Bulería",audio:"audios/17-buleria.mp3"},
  {numero:18,titulo:"Ave María",audio:"audios/18-ave-maria.mp3"},
  {numero:19,titulo:"Cómo Te Atreves",audio:"audios/19-como-te-atreves.mp3"},
  {numero:20,titulo:"Vivir Mi Vida",audio:"audios/20-vivir-mi-vida.mp3"},
  {numero:21,titulo:"Rosa Pastel",audio:"audios/21-rosa-pastel.mp3"},
  {numero:22,titulo:"La Gozadera",audio:"audios/22-la-gozadera.mp3"},
  {numero:23,titulo:"Bomba",audio:"audios/23-bomba.mp3"},
  {numero:24,titulo:"Sueño Contigo",audio:"audios/24-sueno-contigo.mp3"},
  {numero:25,titulo:"Limbo",audio:"audios/25-limbo.mp3"},
  {numero:26,titulo:"Pan y Mantequilla",audio:"audios/26-pan-y-mantequilla.mp3"},
  {numero:27,titulo:"Señorita",audio:"audios/27-senorita.mp3"},
  {numero:28,titulo:"SloMo",audio:"audios/28-slomo.mp3"},
  {numero:29,titulo:"Mi Carro",audio:"audios/29-mi-carro.mp3"},
  {numero:30,titulo:"Morocha",audio:"audios/30-morocha.mp3"},
  {numero:31,titulo:"Que La Detengan",audio:"audios/31-que-la-detengan.mp3"},
  {numero:32,titulo:"Salta",audio:"audios/32-salta.mp3"},
  {numero:33,titulo:"Vino Tinto",audio:"audios/33-vino-tinto.mp3"},
  {numero:34,titulo:"Zapnij pas",audio:"audios/34-zapnij-pas.mp3"},
  {numero:35,titulo:"Nic do stracenia",audio:"audios/35-nic-dostracenia.mp3"}
];

let restantes=[...canciones];
let actual=null;
let ordenSalida=[];

const num=document.getElementById("numero");
const txt=document.getElementById("cancion");
const audio=document.getElementById("audio");
const overlay=document.getElementById("overlay");
const box=document.getElementById("box");
const gridNumeros=document.getElementById("gridNumeros");

/* CREAR GRID 1-99 */
function crearGridNumeros(){
  gridNumeros.innerHTML="";
  for(let i=1;i<=99;i++){
    const casilla=document.createElement("div");
    casilla.className="casilla-numero";
    casilla.id="numero-grid-"+i;
    casilla.innerHTML=`
      <div class="numero-base">${i}</div>
      <div class="orden-salida" id="orden-${i}">#</div>
    `;
    gridNumeros.appendChild(casilla);
  }
}

function marcarNumero(numeroReal, orden){
  const casilla=document.getElementById("numero-grid-"+numeroReal);
  const ordenEl=document.getElementById("orden-"+numeroReal);
  if(casilla) casilla.classList.add("marcado");
  if(ordenEl) ordenEl.textContent="#" + orden;
}

/* CONFETI */
const canvas=document.getElementById("confeti");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confeti=[];

function lanzarConfeti(potente=false){
  confeti=[];
  let cantidad=potente?300:120;

  for(let i=0;i<cantidad;i++){
    confeti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height-canvas.height,
      size:Math.random()*10+5,
      speed:Math.random()*4+2,
      color:`hsl(${Math.random()*360},100%,60%)`
    });
  }
  animarConfeti();
}

function animarConfeti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confeti.forEach(p=>{
    p.y+=p.speed;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,p.size,p.size);
  });
  requestAnimationFrame(animarConfeti);
}

/* JUEGO */
function siguiente(){
  if(restantes.length===0)return;

  let i=Math.floor(Math.random()*restantes.length);
  actual=restantes[i];
  restantes.splice(i,1);

  num.innerText=actual.numero;
  txt.innerText=actual.titulo;

  ordenSalida.push(actual.numero);
  marcarNumero(actual.numero, ordenSalida.length);

  audio.src=actual.audio;
  audio.play().catch(()=>{});
}

function repetir(){
  if(!actual) return;
  audio.play().catch(()=>{});
}

/* LINEA */
function linea(){
  box.className="overlay-box linea";
  box.innerText="LÍNEA / LINIA";
  overlay.classList.add("visible");

  lanzarConfeti(false);

  setTimeout(()=>overlay.classList.remove("visible"),20000);
}

/* BINGO */
function bingo(){
  box.className="overlay-box bingo";
  box.innerText="BINGO";
  overlay.classList.add("visible");

  lanzarConfeti(true);
  crearLuces();

  setTimeout(()=>overlay.classList.remove("visible"),20000);
}

/* LUCES */
function crearLuces(){
  const lucesExistentes=overlay.querySelectorAll(".light");
  lucesExistentes.forEach(l=>l.remove());

  let contenedor=overlay.querySelector(".overlay-box");
  let width=contenedor.offsetWidth;
  let height=contenedor.offsetHeight;
  let total=30;

  for(let i=0;i<total;i++){
    let l=document.createElement("div");
    l.className="light";

    let pos=i/total;

    if(pos<0.25){
      l.style.left=(pos*4*width)+"px";
      l.style.top="0px";
    }else if(pos<0.5){
      l.style.left=width+"px";
      l.style.top=((pos-0.25)*4*height)+"px";
    }else if(pos<0.75){
      l.style.left=(width-(pos-0.5)*4*width)+"px";
      l.style.top=height+"px";
    }else{
      l.style.left="0px";
      l.style.top=(height-(pos-0.75)*4*height)+"px";
    }

    overlay.appendChild(l);
    setTimeout(()=>l.remove(),20000);
  }
}

/* REINICIAR */
function reiniciarBingo(){
  restantes=[...canciones];
  actual=null;
  ordenSalida=[];

  num.innerText="?";
  txt.innerText="Pulsa empezar / Naciśnij start";

  audio.pause();
  audio.currentTime=0;
  audio.removeAttribute("src");

  overlay.classList.remove("visible");
  overlay.querySelectorAll(".light").forEach(l=>l.remove());

  document.querySelectorAll(".casilla-numero").forEach(c=>{
    c.classList.remove("marcado");
  });

  for(let i=1;i<=99;i++){
    const ordenEl=document.getElementById("orden-"+i);
    if(ordenEl) ordenEl.textContent="#";
  }
}

crearGridNumeros();
</script>

</body>
</html>
