<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bingo Musical 🎶</title>

<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
    background: linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#5f27cd,#1dd1a1);
    background-size:400% 400%;
    animation:bg 12s infinite;
  }

  @keyframes bg{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
  }

  .portada{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.82);
    z-index:99999;
  }

  .portada h1{
    font-size:60px;
    margin-bottom:20px;
    animation:zoom 1s ease;
  }

  .portada p{
    font-size:20px;
    opacity:0.85;
    margin-bottom:30px;
  }

  @keyframes zoom{
    0%{transform:scale(0.5);opacity:0}
    100%{transform:scale(1);opacity:1}
  }

  .portada button{
    font-size:20px;
    padding:15px 30px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-weight:bold;
  }

  .container{
    max-width:1200px;
    margin:0 auto;
    padding:20px;
  }

  .numero{
    font-size:80px;
    margin-top:20px;
    font-weight:bold;
  }

  #cancion{
    font-size:24px;
    margin-bottom:20px;
    min-height:32px;
  }

  button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
  }

  .botones{
    margin-bottom:18px;
  }

  .estado{
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:22px;
  }

  .tarjeta-estado{
    background:rgba(255,255,255,0.16);
    padding:12px 18px;
    border-radius:14px;
    min-width:170px;
    font-weight:bold;
  }

  .tarjeta-estado span{
    display:block;
    margin-top:6px;
    font-size:28px;
  }

  .panel-numeros{
    margin-top:25px;
  }

  .grid-numeros{
    display:grid;
    grid-template-columns:repeat(10, minmax(0,1fr));
    gap:8px;
    max-width:900px;
    margin:15px auto 0;
  }

  .casilla-numero{
    background:rgba(255,255,255,0.92);
    color:#222;
    border-radius:10px;
    padding:8px 4px;
    font-weight:bold;
    min-height:52px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
  }

  .casilla-numero.marcado{
    background:#e53935;
    color:white;
  }

  .orden-salida{
    font-size:12px;
    opacity:0;
  }

  .casilla-numero.marcado .orden-salida{
    opacity:1;
  }

  .overlay{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.6);
    opacity:0;
    pointer-events:none;
    z-index:9999;
    transition:opacity .25s ease;
  }

  .overlay.visible{
    opacity:1;
  }

  .overlay-box{
    position:relative;
    padding:50px;
    border-radius:30px;
    transform:scale(0.6);
    opacity:0;
    font-weight:900;
    color:white;
    text-transform:uppercase;
    letter-spacing:4px;
    min-width:320px;
    text-align:center;
  }

  .overlay-text{
    position:relative;
    z-index:2;
  }

  .overlay.visible .overlay-box{
    animation:pop 0.6s forwards;
  }

  @keyframes pop{
    0%{transform:scale(0.4);opacity:0}
    60%{transform:scale(1.2);opacity:1}
    100%{transform:scale(1);opacity:1}
  }

  .linea{
    background:linear-gradient(45deg,#ffb703,#fb8500);
    font-size:70px;
  }

  .bingo{
    background:linear-gradient(45deg,#ff006e,#8338ec,#3a86ff);
    font-size:110px;
    box-shadow:0 0 60px rgba(255,255,255,0.8);
  }

  .light{
    position:absolute;
    width:15px;
    height:15px;
    border-radius:50%;
    background:white;
    box-shadow:0 0 20px white;
    animation:blink 0.5s infinite alternate;
    z-index:1;
  }

  @keyframes blink{
    from{opacity:0.3}
    to{opacity:1}
  }

  #confeti{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9998;
  }

  @media (max-width:700px){
    .portada h1{font-size:42px;}
    .numero{font-size:58px;}
    #cancion{font-size:18px;}
    .grid-numeros{grid-template-columns:repeat(5, minmax(0,1fr));}
    .linea{font-size:42px;}
    .bingo{font-size:62px;}
    .overlay-box{min-width:260px;padding:35px 25px;}
  }
</style>
</head>

<body>

<div class="portada" id="portada">
  <h1>🎶 Bingo Musical 🎶</h1>
  <p>¡Prepárate para jugar! / Przygotuj się do gry!</p>
  <button onclick="empezar()">▶️ Empezar / Rozpocznij</button>
</div>

<div class="container">
  <h1>🎶 Bingo Musical 🎶</h1>

  <div class="numero" id="numero">?</div>
  <div id="cancion">Pulsa empezar / Naciśnij start</div>

  <div class="botones">
    <button onclick="siguiente()">Siguiente / Następna</button>
    <button onclick="repetir()">Repetir / Powtórz</button>
    <button onclick="linea()">Línea / Linia</button>
    <button onclick="bingo()">Bingo</button>
    <button onclick="reiniciarBingo()">Reiniciar / Resetuj</button>
  </div>

  <div class="estado">
    <div class="tarjeta-estado">Líneas / Linie <span id="lineasRestantes">2</span></div>
    <div class="tarjeta-estado">Bingos <span id="bingosRestantes">2</span></div>
  </div>

  <div class="panel-numeros">
    <h2>Números / Numery</h2>
    <div class="grid-numeros" id="gridNumeros"></div>
  </div>

  <audio id="audio"></audio>
</div>

<canvas id="confeti"></canvas>

<div class="overlay" id="overlay">
  <div class="overlay-box" id="box">
    <div class="overlay-text" id="overlayText"></div>
  </div>
</div>

<script>
function empezar(){
  document.getElementById("portada").style.display = "none";
}

const canciones = [
  {numero:1,titulo:"Macarena",artista:"Los del Río",audio:"audios/01-macarena.mp3"},
  {numero:2,titulo:"Aserejé",artista:"Las Ketchup",audio:"audios/02-asereje.mp3"},
  {numero:3,titulo:"Bailando",artista:"Enrique Iglesias",audio:"audios/03-bailando.mp3"},
  {numero:4,titulo:"Sofía",artista:"Álvaro Soler",audio:"audios/04-sofia.mp3"},
  {numero:5,titulo:"El Mismo Sol",artista:"Álvaro Soler",audio:"audios/05-el-mismo-sol.mp3"},
  {numero:6,titulo:"Bailando Por Ahí",artista:"Juan Magán",audio:"audios/06-bailando-por-ahi.mp3"},
  {numero:7,titulo:"Te Voy A Esperar",artista:"Juan Magán",audio:"audios/07-te-voy-a-esperar.mp3"},
  {numero:8,titulo:"Un Beso y Una Flor",artista:"Nino Bravo",audio:"audios/08-un-beso-y-una-flor.mp3"},
  {numero:9,titulo:"Súbeme La Radio",artista:"Enrique Iglesias",audio:"audios/09-subeme-la-radio.mp3"},
  {numero:10,titulo:"Rayos De Sol",artista:"Henry Méndez",audio:"audios/10-rayos-de-sol.mp3"},
  {numero:11,titulo:"Caminando Por La Vida",artista:"Melendi",audio:"audios/11-caminando-por-la-vida.mp3"},
  {numero:12,titulo:"Zapatillas",artista:"El Canto del Loco",audio:"audios/12-zapatillas.mp3"},
  {numero:13,titulo:"Despacito",artista:"Luis Fonsi",audio:"audios/13-despacito.mp3"},
  {numero:14,titulo:"Mon Amour",artista:"Aitana",audio:"audios/14-mon-amour.mp3"},
  {numero:15,titulo:"Princesas",artista:"Pereza",audio:"audios/15-princesas.mp3"},
  {numero:16,titulo:"A Quién Le Importa",artista:"Alaska",audio:"audios/16-a-quien-le-importa.mp3"},
  {numero:17,titulo:"Bulería",artista:"David Bisbal",audio:"audios/17-buleria.mp3"},
  {numero:18,titulo:"Ave María",artista:"David Bisbal",audio:"audios/18-ave-maria.mp3"},
  {numero:19,titulo:"Cómo Te Atreves",artista:"Morat",audio:"audios/19-como-te-atreves.mp3"},
  {numero:20,titulo:"Vivir Mi Vida",artista:"Marc Anthony",audio:"audios/20-vivir-mi-vida.mp3"},
  {numero:21,titulo:"Rosa Pastel",artista:"Belanova",audio:"audios/21-rosa-pastel.mp3"},
  {numero:22,titulo:"La Gozadera",artista:"Gente de Zona",audio:"audios/22-la-gozadera.mp3"},
  {numero:23,titulo:"Bomba",artista:"King África",audio:"audios/23-bomba.mp3"},
  {numero:24,titulo:"Sueño Contigo",artista:"Camela",audio:"audios/24-sueno-contigo.mp3"},
  {numero:25,titulo:"Limbo",artista:"Daddy Yankee",audio:"audios/25-limbo.mp3"},
  {numero:26,titulo:"Pan y Mantequilla",artista:"Efecto Pasillo",audio:"audios/26-pan-y-mantequilla.mp3"},
  {numero:27,titulo:"Señorita",artista:"Abraham Mateo",audio:"audios/27-senorita.mp3"},
  {numero:28,titulo:"SloMo",artista:"Chanel",audio:"audios/28-slomo.mp3"},
  {numero:29,titulo:"Mi Carro",artista:"Manolo Escobar",audio:"audios/29-mi-carro.mp3"},
  {numero:30,titulo:"Morocha",artista:"Luck Ra",audio:"audios/30-morocha.mp3"},
  {numero:31,titulo:"Que La Detengan",artista:"David Civera",audio:"audios/31-que-la-detengan.mp3"},
  {numero:32,titulo:"Salta",artista:"Tequila",audio:"audios/32-salta.mp3"},
  {numero:33,titulo:"Vino Tinto",artista:"Estopa",audio:"audios/33-vino-tinto.mp3"},
  {numero:34,titulo:"Zapnij pas",artista:"Mata",audio:"audios/34-zapnij-pas.mp3"},
  {numero:35,titulo:"Nic do stracenia",artista:"Myslovitz",audio:"audios/35-nic-dostracenia.mp3"}
];

let restantes = [...canciones];
let actual = null;
let ordenSalida = [];
let lineasRestantes = 2;
let bingosRestantes = 2;
let overlayTimer = null;

const num = document.getElementById("numero");
const txt = document.getElementById("cancion");
const audio = document.getElementById("audio");
const overlay = document.getElementById("overlay");
const box = document.getElementById("box");
const overlayText = document.getElementById("overlayText");
const lineasRestantesEl = document.getElementById("lineasRestantes");
const bingosRestantesEl = document.getElementById("bingosRestantes");

const canvas = document.getElementById("confeti");
const ctx = canvas.getContext("2d");
let confettiPieces = [];
let confettiAnimationId = null;
let confettiEndTime = 0;

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function crearGrid(){
  const grid = document.getElementById("gridNumeros");
  grid.innerHTML = "";
  for(let i=1;i<=99;i++){
    let div = document.createElement("div");
    div.className = "casilla-numero";
    div.id = "n"+i;
    div.innerHTML = `<div>${i}</div><div class="orden-salida" id="o${i}"></div>`;
    grid.appendChild(div);
  }
}
crearGrid();

function actualizarContadores(){
  lineasRestantesEl.textContent = lineasRestantes;
  bingosRestantesEl.textContent = bingosRestantes;
}

function marcar(numReal, orden){
  const celda = document.getElementById("n"+numReal);
  const ordenEl = document.getElementById("o"+numReal);
  if(celda) celda.classList.add("marcado");
  if(ordenEl) ordenEl.textContent = "#" + orden;
}

function siguiente(){
  if(restantes.length === 0) return;

  let i = Math.floor(Math.random()*restantes.length);
  actual = restantes[i];
  restantes.splice(i,1);

  num.textContent = actual.numero;
  txt.textContent = actual.titulo + " (" + actual.artista + ")";

  ordenSalida.push(actual.numero);
  marcar(actual.numero, ordenSalida.length);

  audio.src = actual.audio;
  audio.play().catch(()=>{});
}

function repetir(){
  if(!actual) return;
  audio.play().catch(()=>{});
}

function limpiarLuces(){
  box.querySelectorAll(".light").forEach(l => l.remove());
}

function crearLuces(){
  limpiarLuces();

  const width = box.offsetWidth;
  const height = box.offsetHeight;
  const total = 30;

  for(let i=0;i<total;i++){
    const l = document.createElement("div");
    l.className = "light";
    const pos = i / total;

    if(pos < 0.25){
      l.style.left = (pos * 4 * width) + "px";
      l.style.top = "0px";
    } else if(pos < 0.5){
      l.style.left = (width - 15) + "px";
      l.style.top = ((pos - 0.25) * 4 * height) + "px";
    } else if(pos < 0.75){
      l.style.left = (width - (pos - 0.5) * 4 * width) + "px";
      l.style.top = (height - 15) + "px";
    } else {
      l.style.left = "0px";
      l.style.top = (height - (pos - 0.75) * 4 * height) + "px";
    }

    box.appendChild(l);
  }
}

function generarConfeti(tipo){
  const cantidad = tipo === "bingo" ? 320 : 170;
  confettiPieces = [];

  for(let i=0;i<cantidad;i++){
    confettiPieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 10 + 6,
      h: Math.random() * 16 + 6,
      speedY: Math.random() * (tipo === "bingo" ? 5 : 3.4) + 2,
      speedX: Math.random() * (tipo === "bingo" ? 4 : 2.4) - (tipo === "bingo" ? 2 : 1.2),
      rotation: Math.random() * Math.PI * 2,
      rotationSpeed: Math.random() * 0.24 - 0.12,
      color: `hsl(${Math.random()*360},100%,${50 + Math.random()*20}%)`
    });
  }
}

function dibujarConfeti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  confettiPieces.forEach(piece => {
    piece.x += piece.speedX;
    piece.y += piece.speedY;
    piece.rotation += piece.rotationSpeed;

    ctx.save();
    ctx.translate(piece.x, piece.y);
    ctx.rotate(piece.rotation);
    ctx.fillStyle = piece.color;
    ctx.fillRect(-piece.w/2, -piece.h/2, piece.w, piece.h);
    ctx.restore();
  });

  confettiPieces = confettiPieces.filter(piece => piece.y < canvas.height + 60);
}

function loopConfeti(){
  dibujarConfeti();

  if(Date.now() < confettiEndTime || confettiPieces.length > 0){
    confettiAnimationId = requestAnimationFrame(loopConfeti);
  } else {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confettiAnimationId = null;
  }
}

function lanzarConfeti(tipo){
  generarConfeti(tipo);
  confettiEndTime = Date.now() + 20000;

  if(!confettiAnimationId){
    loopConfeti();
  }
}

function mostrarOverlay(texto, clase, conLuces=false){
  clearTimeout(overlayTimer);
  limpiarLuces();

  box.className = "overlay-box " + clase;
  overlayText.textContent = texto;

  overlay.classList.remove("visible");
  void overlay.offsetWidth;

  if(conLuces){
    crearLuces();
  }

  overlay.classList.add("visible");

  overlayTimer = setTimeout(() => {
    overlay.classList.remove("visible");
    limpiarLuces();
  }, 20000);
}

function linea(){
  if(lineasRestantes <= 0) return;
  lineasRestantes--;
  actualizarContadores();
  mostrarOverlay("LÍNEA / LINIA", "linea", false);
  lanzarConfeti("linea");
}

function bingo(){
  if(bingosRestantes <= 0) return;
  bingosRestantes--;
  actualizarContadores();
  mostrarOverlay("BINGO", "bingo", true);
  lanzarConfeti("bingo");
}

function reiniciarBingo(){
  restantes = [...canciones];
  actual = null;
  ordenSalida = [];
  lineasRestantes = 2;
  bingosRestantes = 2;
  actualizarContadores();

  num.textContent = "?";
  txt.textContent = "Pulsa empezar / Naciśnij start";

  audio.pause();
  audio.currentTime = 0;
  audio.removeAttribute("src");

  clearTimeout(overlayTimer);
  overlay.classList.remove("visible");
  limpiarLuces();

  if(confettiAnimationId){
    cancelAnimationFrame(confettiAnimationId);
    confettiAnimationId = null;
  }
  confettiPieces = [];
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=1;i<=99;i++){
    const celda = document.getElementById("n"+i);
    const ordenEl = document.getElementById("o"+i);
    if(celda) celda.classList.remove("marcado");
    if(ordenEl) ordenEl.textContent = "";
  }
}

actualizarContadores();
</script>

</body>
</html>
